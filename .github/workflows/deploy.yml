name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Lint + type checks ────────────────────────
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Backend lint
        working-directory: backend
        run: |
          pip install ".[dev]"
          ruff check .
          ruff format --check .

      - name: Frontend checks
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npx tsc --noEmit
          npm run build

  # ── Backend tests (required gate) ──────────────
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kickoff_test
          POSTGRES_USER: kickoff
          POSTGRES_PASSWORD: kickoff
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      SECRET_KEY: ci-test-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://kickoff:kickoff@localhost:5432/kickoff_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: kickoff.settings.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: backend
        run: pip install ".[dev]"
      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput
      - name: Run tests
        working-directory: backend
        run: pytest --cov=apps --cov-report=term-missing --cov-fail-under=70

  # ── Build & push Docker images (SHA-pinned) ────
  build-images:
    needs: [checks, backend-tests]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # ── Deploy (SSH to VPS) ────────────────────────
  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH || '/opt/kickoff' }}
            export IMAGE_TAG=${{ github.sha }}

            # Pre-deploy backup
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres \
              pg_dump -U ${POSTGRES_USER:-kickoff} ${POSTGRES_DB:-kickoff} --no-owner --no-acl \
              | gzip > /opt/kickoff/backups/pre_deploy_$(date +%Y%m%d_%H%M%S).sql.gz || true

            # Pull SHA-pinned images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            # Smoke test — wait for backend health
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost:8000/api/v1/public/health/ > /dev/null 2>&1; then
                echo "✓ Backend healthy"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "✗ Backend health check failed — check logs"
                exit 1
              fi
              echo "Waiting for backend... ($i/6)"
              sleep 10
            done

            docker image prune -f
