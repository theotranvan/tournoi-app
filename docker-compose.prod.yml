# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    restart: always
    ports: []   # No host exposure in prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kickoff}
      POSTGRES_USER: ${POSTGRES_USER:-kickoff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kickoff}"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    restart: always
    ports: []   # No host exposure in prod
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 --proxy-headers kickoff.asgi:application"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports: []   # Only exposed via nginx
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=kickoff.settings.prod
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/public/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-worker:
    command: celery -A kickoff worker -l warning --concurrency=4 --max-tasks-per-child=1000
    volumes: []
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=kickoff.settings.prod
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "celery -A kickoff inspect ping --timeout 10 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  celery-beat:
    command: celery -A kickoff beat -l warning
    volumes: []
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=kickoff.settings.prod
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "celery -A kickoff inspect ping --timeout 10 2>/dev/null | grep -q OK"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  frontend:
    restart: always
    ports: []   # Only exposed via nginx
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.footix.app/api/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://api.footix.app/ws}
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_static:/app/backend/staticfiles:ro
      - backend_media:/app/backend/media:ro

  # ── Backup cron (daily at 3 AM) ────────────────
  backup:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kickoff}
      POSTGRES_USER: ${POSTGRES_USER:-kickoff}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - backups_data:/backups
    depends_on:
      - postgres
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache dcron &&
        echo "0 3 * * * DUMP=/backups/db_\$\$(date +\%Y\%m\%d_\%H\%M\%S).sql.gz && pg_dump -h postgres -U \$\$POSTGRES_USER \$\$POSTGRES_DB --no-owner --no-acl | gzip > \$\$DUMP && sha256sum \$\$DUMP > \$\$DUMP.sha256 && gunzip -t \$\$DUMP && find /backups -name '*.gz' -mtime +30 -delete && find /backups -name '*.sha256' -mtime +30 -delete" | crontab - &&
        crond -f -l 2
    deploy:
      resources:
        limits:
          memory: 128M
